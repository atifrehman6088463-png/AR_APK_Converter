name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Structure
        run: |
          cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          
      - name: Force Sync Configuration and Web Files
        run: |
          # یہاں ہم پرانی فائلز کو زبردستی اپنی اصل فائلوں سے بدل رہے ہیں
          rm -f my-app/config.xml
          cp config.xml my-app/config.xml
          cp index.html my-app/www/index.html
          cp logo.png my-app/www/logo.png || true
          cp splash.png my-app/www/splash.png || true

      - name: Build Android Platform
        run: |
          cd my-app
          # پہلے پلیٹ فارم ایڈ ہوگا جو آپ کی config.xml کو پڑھے گا
          cordova platform add android
          # اب پرنٹنگ پلگ ان اس کنفیگریشن کے مطابق انسٹال ہوگا
          cordova plugin add cordova-plugin-printer --save

      - name: Compile APK
        run: |
          cd my-app
          cordova build android --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
