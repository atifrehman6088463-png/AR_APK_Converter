name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # یہ کورڈووا کے نئے ورژنز کے لیے بالکل پرفیکٹ ہے

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          
      - name: Copy Custom Config & Web Files
        run: |
          cp config.xml my-app/config.xml || true
          cp index.html my-app/www/index.html || true
          cp logo.png my-app/www/logo.png || true
          cp splash.png my-app/www/splash.png || true

      - name: Add Android Platform & Plugins
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk # گٹ ہب کا اپنا آفیشل ایس ڈی کے پاتھ
        run: |
          cd my-app
          cordova platform add android
          cordova plugin add cordova-plugin-file --save
          cordova plugin add cordova-plugin-splashscreen --save
          cordova plugin add cordova-plugin-printer --save

      - name: Build Android APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          cd my-app
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
