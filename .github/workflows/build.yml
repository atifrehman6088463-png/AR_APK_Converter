name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          cd my-app
          cordova platform add android

      # یہاں پر ہم ضروری Cordova پلگ انز انسٹال کر رہے ہیں
      - name: Install Cordova Storage & Permission Plugins
        run: |
          cd my-app
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-android-permissions

      - name: Inject Custom Web Files, Branding & Permissions
        run: |
          # 1. Copy index.html to Cordova www folder
          if [ -f index.html ]; then
            cp index.html my-app/www/index.html
          fi
          
          # 2. Copy CSS and JS files if they exist
          cp -r *.css my-app/www/ 2>/dev/null || true
          cp -r *.js my-app/www/ 2>/dev/null || true
          
          # 3. Inject logo.png as app main icon if uploaded
          if [ -f logo.png ]; then
            cp logo.png my-app/www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" \/>' my-app/config.xml
          fi

          # 4. Inject Android Permissions into config.xml
          # یہ کوڈ اینڈرائیڈ کو بتائے گا کہ ایپ کو اسٹوریج استعمال کرنے کی اجازت چاہیے، جس سے موبائل سیٹنگز میں پرمیشن کا آپشن ا جائے گا۔
          sed -i '/<\/widget>/i \    <config-file target="AndroidManifest.xml" parent="/*">\n        <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n        <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    </config-file>' my-app/config.xml

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd my-app
          cordova build android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/**/*.apk
          
