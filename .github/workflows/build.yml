name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          cd my-app
          cordova platform add android

      # یہاں ہم اسٹوریج اور فائل میجمنٹ کا پلگ ان انسٹال کر رہے ہیں
      - name: Install Cordova File Plugins
        run: |
          cd my-app
          cordova plugin add cordova-plugin-file

      - name: Inject Web File, Branding & Config
        run: |
          # 1. Copy your single index.html to Cordova www folder
          if [ -f index.html ]; then
            cp index.html my-app/www/index.html
          fi
          
          # 2. Inject logo.png as app main icon if uploaded
          if [ -f logo.png ]; then
            cp logo.png my-app/www/logo.png
            sed -i '/<\/widget>/i \    <icon src="www/logo.png" />' my-app/config.xml
          fi

          # 3. Inject splash.png as Custom Splash Screen if uploaded
          if [ -f splash.png ]; then
            cp splash.png my-app/www/splash.png
            sed -i '/<\/widget>/i \    <preference name="SplashScreen" value="www/splash.png" />' my-app/config.xml
            sed -i '/<\/widget>/i \    <preference name="AutoHideSplashScreen" value="true" />' my-app/config.xml
            sed -i '/<\/widget>/i \    <preference name="SplashScreenDelay" value="3000" />' my-app/config.xml
          fi

          # 4. Correctly Inject Android Storage Permissions with custom config block
          sed -i '/<\/widget>/i \    <platform name="android">' my-app/config.xml
          sed -i '/<\/widget>/i \        <config-file target="AndroidManifest.xml" parent="/*">' my-app/config.xml
          sed -i '/<\/widget>/i \            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' my-app/config.xml
          sed -i '/<\/widget>/i \            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' my-app/config.xml
          sed -i '/<\/widget>/i \        </config-file>' my-app/config.xml
          sed -i '/<\/widget>/i \    </platform>' my-app/config.xml

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd my-app
          cordova build android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/**/*.apk
          
