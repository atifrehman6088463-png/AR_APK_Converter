Name: Build Android APK
on:
  Push:
    Branches:
      - main
  Workflow_dispatch:

Jobs:
  Build:
    Runs-on: ubuntu-latest
    Steps:
      - name: Checkout Source Code
        Uses: actions/checkout@v4

      - name: Set up Node.js
        Uses: actions/setup-node@v4
        With:
          Node-version: '20.x'

      - name: Install Cordova
        Run: npm install -g cordova

      - name: Create Cordova Project
        Run: |
          Cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          Cd my-app
          Cordova platform add android

      - name: Install Safe Printer Plugin
        Run: |
          Cd my-app
          # پرنٹر پلگ ان کو گٹ ہب سورس سے انسٹال کرنا تاکہ اینڈرائیڈ کے نئے ورژن پر کریش نہ ہو
          Cordova plugin add https://github.com/katzer/cordova-plugin-printer.git --save

      - name: Inject Custom Web Files & Branding
        Run: |
          # 1. سب سے پہلے کڈووا کے مین فولڈر میں اپنی کسٹم کنفیگ فائل کاپی کرنا
          If [ -f config.xml ]; then
            Cp config.xml my-app/config.xml
          Fi
          # 2. پھر تمام ویب فائلز کو 'www' فولڈر کے اندر منتقل کرنا
          If [ -f index.html ]; then cp index.html my-app/www/index.html; fi
          Cp -r *.css my-app/www/ 2>/dev/null || true
          Cp -r *.js my-app/www/ 2>/dev/null || true
          If [ -f logo.png ]; then cp logo.png my-app/www/logo.png; fi

      - name: Setup Java JDK
        Uses: actions/setup-java@v4
        With:
          Distribution: 'zulu'
          Java-version: '17'

      - name: Setup Android SDK
        Uses: android-actions/setup-android@v3

      - name: Build Android APK
        Run: |
          Cd my-app
          # کڈووا پروجیکٹ کو اینڈرائیڈ اے پی کے کے لیے بلڈ کرنا
          Cordova build android

      - name: Upload APK Artifact
        Uses: actions/upload-artifact@v4
        With:
          Name: Android-APK
          Path: my-app/platforms/android/app/build/outputs/apk/debug/*.apk
