name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova and Dependencies
      run: |
        npm install -g cordova
        npm install

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Add Android Platform and Plugins
      run: |
        cordova platform add android --no-telemetry || true
        cordova plugin add cordova-plugin-printer --save || true

    - name: Build Android APK (Debug)
      run: |
        cordova build android --debug

    - name: Upload Build Artifact (APK)
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
