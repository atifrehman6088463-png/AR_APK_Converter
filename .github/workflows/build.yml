name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          
      - name: Copy Custom Config & Web Files
        run: |
          cp config.xml my-app/config.xml
          cp index.html my-app/www/index.html
          cp logo.png my-app/www/logo.png
          cp splash.png my-app/www/splash.png

      - name: Add Android Platform & Plugins
        run: |
          cd my-app
          cordova platform add android
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-splashscreen
          cordova plugin add cordova-plugin-printer

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject Legacy Storage Permission
        run: |
          sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/' my-app/platforms/android/app/src/main/AndroidManifest.xml

      - name: Build Android APK
        run: |
          cd my-app
          cordova clean android
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/
          if-no-files-found: error
