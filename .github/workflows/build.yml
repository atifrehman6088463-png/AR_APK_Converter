name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # مستحکم نوڈ ورژن

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # اینڈرائیڈ 11/12 بلڈز کے لیے سب سے بہترین اور مستحکم جے ڈی کے

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12.0.0 # مخصوص مستحکم ورژن

      - name: Create Cordova Project
        run: |
          cordova create my-app com.arappcreator.sellerpro "Seller Pro"
          
      - name: Copy Custom Config & Web Files
        run: |
          cp config.xml my-app/config.xml || true
          cp index.html my-app/www/index.html || true
          cp logo.png my-app/www/logo.png || true
          cp splash.png my-app/www/splash.png || true

      - name: Add Android Platform & Plugins
        run: |
          cd my-app
          cordova platform add android@11.0.0 --save # ورژن کو لاک کر دیا تاکہ گریڈل کریش نہ ہو
          cordova plugin add cordova-plugin-file --save
          cordova plugin add cordova-plugin-splashscreen --save
          cordova plugin add cordova-plugin-printer --save

      - name: Build Android APK
        run: |
          cd my-app
          cordova build android --debug --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/
          if-no-files-found: error
