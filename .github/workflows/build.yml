name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Export Android SDK Env Variables
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "$ANDROID_HOME/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Install Cordova
        run: npm install -g cordova

      # 🌟 تبدیل شدہ حصہ: اب یہ پرانے پلگ انز کے بغیر بالکل صاف اور نیا اینڈرائیڈ پروجیکٹ بنائے گا
      - name: Create Cordova Project
        run: |
          cordova create my-app com.arappcreator.halaldarorder "halaldar order"
          cd my-app
          cordova platform add android --save

      - name: Inject Custom Web Files & Branding
        run: |
          if [ -f config.xml ]; then
            cp config.xml my-app/config.xml
          fi
          if [ -f index.html ]; then cp index.html my-app/www/index.html; fi
          cp -r *.css my-app/www/ 2>/dev/null || true
          cp -r *.js my-app/www/ 2>/dev/null || true
          if [ -f logo.png ]; then cp logo.png my-app/www/logo.png; fi

      - name: Build Android APK
        run: |
          cd my-app
          cordova build android

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: my-app/platforms/android/app/build/outputs/apk/debug/*.apk
